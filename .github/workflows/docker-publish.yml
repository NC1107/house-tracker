name: Build and publish image

# Builds the app image (and a companion "tools" image for migrations/ingestion) and
# pushes them to GitHub Container Registry (GHCR). Uses the built-in GITHUB_TOKEN — no
# extra secrets needed. Images land at:
#   ghcr.io/<owner>/house-tracker        (the web app, standalone runtime)
#   ghcr.io/<owner>/house-tracker-tools  (drizzle-kit + tsx + scripts for db jobs)

on:
  push:
    branches: ["main", "claude/housing-price-tracker-ul45rp"]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: house-tracker
            target: runner
          - name: house-tracker-tools
            target: builder
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so a mixed-case owner is fine.
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
