name: Ingest housing data

# Heavy bulk ingestion runs here (not Vercel) to avoid serverless timeouts.
on:
  schedule:
    - cron: "0 9 * * *" # daily 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      HUD_TOKEN: ${{ secrets.HUD_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run migrations
        run: npx drizzle-kit migrate
      - name: Seed geographies + catalog
        run: npm run seed:geo
      - name: Ingest FRED (rates, indices)
        run: npm run ingest:fred
      - name: Ingest Zillow (ZHVI, ZORI)
        run: npm run ingest:zillow
      - name: Ingest Redfin (market metrics)
        run: npm run ingest:redfin

      - name: Open an issue if ingestion failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Data ingestion failed on ${new Date().toISOString().slice(0,10)}`;
            const body = `The scheduled ingestion workflow failed. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'ingestion-failure' });
            if (existing.data.length === 0) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['ingestion-failure'] });
            }
